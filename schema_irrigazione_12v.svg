<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <style>
      .page { fill: #fbfbf7; }
      .title { font: 700 42px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 24px Arial, sans-serif; fill: #52616b; }
      .section { font: 700 22px Arial, sans-serif; fill: #334e68; letter-spacing: .5px; }
      .label { font: 700 24px Arial, sans-serif; fill: #1f2933; }
      .small { font: 18px Arial, sans-serif; fill: #334e68; }
      .tiny { font: 15px Arial, sans-serif; fill: #334e68; }
      .box { fill: #ffffff; stroke: #9fb3c8; stroke-width: 3; rx: 8; }
      .busbox { fill: #eef8f4; stroke: #51a37d; stroke-width: 3; rx: 8; }
      .warnbox { fill: #fff7ed; stroke: #f59e0b; stroke-width: 3; rx: 8; }
      .red { stroke: #d7263d; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .black { stroke: #111827; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .green { stroke: #0f9f6e; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12 10; }
      .blue { stroke: #2563eb; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .violet { stroke: #7c3aed; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .orange { stroke: #f57c00; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 3; }
      .arrow { marker-end: url(#arrowhead); }
      .hop { stroke: #fbfbf7; stroke-width: 26; fill: none; }
      .dotRed { fill: #d7263d; }
      .dotBlack { fill: #111827; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334e68" />
    </marker>
  </defs>

  <rect class="page" width="1600" height="1100"/>

  <text x="70" y="70" class="title">Schema rapido irrigazione 12 V</text>
  <text x="70" y="108" class="subtitle">3 pompe / 3 zone - Raspberry Pi Zero 2 + scheda rele 8 canali alimentata dai pin del Pi</text>

  <text x="70" y="165" class="section">ENERGIA</text>
  <text x="70" y="515" class="section">CONTROLLO</text>
  <text x="1080" y="510" class="section">POMPE / ZONE</text>

  <!-- ENERGIA -->
  <rect x="70" y="190" width="210" height="115" class="box"/>
  <text x="175" y="235" text-anchor="middle" class="label">Pannello</text>
  <text x="175" y="266" text-anchor="middle" class="small">solare 100 W</text>
  <line x1="102" y1="285" x2="248" y2="285" class="blue thin"/>
  <line x1="126" y1="210" x2="126" y2="300" class="blue thin"/>
  <line x1="166" y1="210" x2="166" y2="300" class="blue thin"/>
  <line x1="206" y1="210" x2="206" y2="300" class="blue thin"/>

  <rect x="340" y="190" width="210" height="115" class="box"/>
  <text x="445" y="235" text-anchor="middle" class="label">MPPT</text>
  <text x="445" y="266" text-anchor="middle" class="small">regolatore carica</text>

  <rect x="610" y="190" width="210" height="115" class="box"/>
  <text x="715" y="235" text-anchor="middle" class="label">Batteria</text>
  <text x="715" y="266" text-anchor="middle" class="small">12 V</text>
  <text x="642" y="290" class="small">+</text>
  <text x="775" y="290" class="small">-</text>

  <rect x="875" y="190" width="150" height="115" class="warnbox"/>
  <text x="950" y="235" text-anchor="middle" class="label">Fusibile</text>
  <text x="950" y="266" text-anchor="middle" class="small">vicino batteria</text>

  <rect x="1080" y="190" width="250" height="145" class="busbox"/>
  <text x="1205" y="228" text-anchor="middle" class="label">Bus potenza</text>
  <line x1="1120" y1="265" x2="1295" y2="265" class="red"/>
  <line x1="1120" y1="305" x2="1295" y2="305" class="black"/>
  <text x="1125" y="256" class="tiny">+12 V</text>
  <text x="1125" y="297" class="tiny">GND</text>

  <line x1="280" y1="248" x2="340" y2="248" class="blue arrow"/>
  <line x1="550" y1="235" x2="610" y2="235" class="red arrow"/>
  <line x1="550" y1="270" x2="610" y2="270" class="black arrow"/>
  <line x1="820" y1="235" x2="875" y2="235" class="red"/>
  <line x1="1025" y1="235" x2="1120" y2="265" class="red"/>
  <line x1="820" y1="285" x2="1120" y2="305" class="black"/>

  <!-- CONTROLLO: buck -->
  <rect x="70" y="530" width="230" height="130" class="box"/>
  <text x="185" y="572" text-anchor="middle" class="label">Buck 12-&gt;5 V</text>
  <text x="185" y="602" text-anchor="middle" class="small">uscita USB -&gt; Pi</text>
  <text x="185" y="640" text-anchor="middle" class="tiny">IN: 12 V dal bus (fusibile 2 A)</text>

  <!-- CONTROLLO: Raspberry Pi -->
  <rect x="380" y="530" width="300" height="240" class="box"/>
  <text x="505" y="565" text-anchor="middle" class="label">Raspberry Pi</text>
  <text x="505" y="592" text-anchor="middle" class="small">Zero 2 W</text>
  <text x="670" y="585" text-anchor="end" class="tiny">GPIO17 - pin 11</text>
  <text x="670" y="610" text-anchor="end" class="tiny">GPIO27 - pin 13</text>
  <text x="670" y="635" text-anchor="end" class="tiny">GPIO22 - pin 15</text>
  <text x="670" y="670" text-anchor="end" class="tiny">3.3 V - pin 1</text>
  <text x="670" y="700" text-anchor="end" class="tiny">5 V - pin 2</text>
  <text x="670" y="730" text-anchor="end" class="tiny">GND - pin 6</text>
  <text x="505" y="742" text-anchor="middle" class="tiny">alimentato via USB dal buck</text>
  <text x="505" y="760" text-anchor="middle" class="tiny">collegamenti via morsettiera GPIO</text>

  <!-- CONTROLLO: scheda rele -->
  <rect x="760" y="470" width="250" height="480" class="box"/>
  <text x="885" y="505" text-anchor="middle" class="label">Scheda rele 8 canali</text>
  <text x="885" y="532" text-anchor="middle" class="small">optoisolata - active low</text>
  <text x="885" y="552" text-anchor="middle" class="tiny">(3 canali usati su 8)</text>
  <text x="772" y="585" class="tiny">IN1 &lt;- GPIO17</text>
  <text x="772" y="610" class="tiny">IN2 &lt;- GPIO27</text>
  <text x="772" y="635" class="tiny">IN3 &lt;- GPIO22</text>
  <text x="772" y="670" class="tiny">VCC &lt;- 3.3 V Pi</text>
  <text x="772" y="700" class="tiny">JD-VCC &lt;- 5 V Pi</text>
  <text x="772" y="730" class="tiny">GND &lt;- GND Pi</text>
  <text x="1002" y="565" text-anchor="end" class="tiny">CH1 COM</text>
  <text x="1002" y="600" text-anchor="end" class="tiny">CH1 NO</text>
  <text x="1002" y="720" text-anchor="end" class="tiny">CH2 COM</text>
  <text x="1002" y="755" text-anchor="end" class="tiny">CH2 NO</text>
  <text x="1002" y="900" text-anchor="end" class="tiny">CH3 COM</text>
  <text x="1002" y="935" text-anchor="end" class="tiny">CH3 NO</text>
  <text x="772" y="865" class="tiny" font-weight="700">Jumper VCC/JD-VCC:</text>
  <text x="772" y="884" class="tiny" font-weight="700">RIMOSSO</text>

  <!-- POMPE / ZONE -->
  <rect x="1080" y="520" width="390" height="150" class="box"/>
  <text x="1105" y="555" class="label">Area 1 - acqua alta</text>
  <rect x="1130" y="570" width="110" height="50" class="box"/>
  <text x="1185" y="601" text-anchor="middle" class="small">Pompa 1</text>
  <text x="1258" y="625" class="tiny">da serbatoio 1</text>
  <path d="M1150 620 V645 H1220 V620" class="black thin"/>
  <polygon points="1196,637 1196,653 1180,645" fill="#111827"/>
  <line x1="1176" y1="637" x2="1176" y2="653" class="black thin"/>
  <text x="1185" y="666" text-anchor="middle" class="tiny">1N5819</text>

  <rect x="1080" y="675" width="390" height="150" class="box"/>
  <text x="1105" y="710" class="label">Area 2 - media</text>
  <rect x="1130" y="725" width="110" height="50" class="box"/>
  <text x="1185" y="756" text-anchor="middle" class="small">Pompa 2</text>
  <text x="1258" y="780" class="tiny">da serbatoio 2</text>
  <path d="M1150 775 V800 H1220 V775" class="black thin"/>
  <polygon points="1196,792 1196,808 1180,800" fill="#111827"/>
  <line x1="1176" y1="792" x2="1176" y2="808" class="black thin"/>
  <text x="1185" y="821" text-anchor="middle" class="tiny">1N5819</text>

  <rect x="1080" y="855" width="390" height="150" class="box"/>
  <text x="1105" y="890" class="label">Area 3 - secca</text>
  <rect x="1130" y="905" width="110" height="50" class="box"/>
  <text x="1185" y="936" text-anchor="middle" class="small">Pompa 3</text>
  <text x="1258" y="960" class="tiny">da serbatoio 3</text>
  <path d="M1150 955 V980 H1220 V955" class="black thin"/>
  <polygon points="1196,972 1196,988 1180,980" fill="#111827"/>
  <line x1="1176" y1="972" x2="1176" y2="988" class="black thin"/>
  <text x="1185" y="1001" text-anchor="middle" class="tiny">1N5819</text>

  <!-- Rete +12 V -->
  <path d="M1120 265 H1045 V895" class="red"/>
  <path d="M1045 560 H1010" class="red"/>
  <path d="M1045 715 H1010" class="red"/>
  <path d="M1045 895 H1010" class="red"/>
  <path d="M1045 420 H120 V530" class="red"/>

  <!-- Rete GND -->
  <path d="M1120 305 H1075 V450 H160 V530" class="black"/>
  <path d="M540 450 V530" class="black"/>
  <text x="552" y="500" class="tiny">GND Pi -&gt; bus</text>
  <path d="M1240 595 H1540" class="black"/>
  <path d="M1240 750 H1540" class="black"/>
  <path d="M1240 930 H1540 V305 H1295" class="black"/>

  <!-- Uscite NO -> pompe (ponticello = nessuna giunzione sulla verticale +12 V) -->
  <path d="M1031 595 H1059" class="hop"/>
  <path d="M1010 595 H1130" class="red"/>
  <path d="M1031 750 H1059" class="hop"/>
  <path d="M1010 750 H1130" class="red"/>
  <path d="M1010 930 H1130" class="red"/>

  <!-- Segnali e alimentazione scheda rele dal Pi -->
  <path d="M680 580 H760" class="green"/>
  <path d="M680 605 H760" class="green"/>
  <path d="M680 630 H760" class="green"/>
  <path d="M680 665 H760" class="violet"/>
  <path d="M680 695 H760" class="orange"/>
  <path d="M680 725 H760" class="black thin"/>
  <path d="M300 600 H380" class="orange"/>
  <text x="307" y="590" class="tiny">5 V USB</text>

  <!-- Giunzioni -->
  <circle cx="1045" cy="420" r="7" class="dotRed"/>
  <circle cx="1045" cy="560" r="7" class="dotRed"/>
  <circle cx="1045" cy="715" r="7" class="dotRed"/>
  <circle cx="540" cy="450" r="7" class="dotBlack"/>
  <circle cx="1540" cy="595" r="7" class="dotBlack"/>
  <circle cx="1540" cy="750" r="7" class="dotBlack"/>

  <!-- Legenda -->
  <rect x="70" y="700" width="230" height="190" class="box"/>
  <text x="95" y="735" class="label">Legenda</text>
  <line x1="95" y1="763" x2="145" y2="763" class="red"/>
  <text x="158" y="769" class="tiny">+12 V potenza</text>
  <line x1="95" y1="791" x2="145" y2="791" class="black"/>
  <text x="158" y="797" class="tiny">GND comune</text>
  <line x1="95" y1="819" x2="145" y2="819" class="green"/>
  <text x="158" y="825" class="tiny">segnale GPIO 3.3 V</text>
  <line x1="95" y1="847" x2="145" y2="847" class="violet"/>
  <text x="158" y="853" class="tiny">3.3 V dal Pi</text>
  <line x1="95" y1="875" x2="145" y2="875" class="orange"/>
  <text x="158" y="881" class="tiny">5 V dal Pi</text>

  <!-- Note -->
  <rect x="70" y="955" width="900" height="140" class="warnbox"/>
  <text x="95" y="985" class="label">Da ricordare mentre cabli</text>
  <text x="95" y="1012" class="small">1. Tutti i GND al bus comune: batteria, buck, Raspberry, scheda rele e pompe.</text>
  <text x="95" y="1038" class="small">2. Pompa: bus +12 V -&gt; COM -&gt; NO -&gt; pompa+; pompa- al bus GND. Diodo 1N5819 (catodo al +).</text>
  <text x="95" y="1064" class="small">3. Scheda rele dal Pi: VCC &lt;- 3.3 V (pin 1), JD-VCC &lt;- 5 V (pin 2), GND &lt;- GND (pin 6). Jumper RIMOSSO.</text>
  <text x="95" y="1090" class="small">4. Active-low: GPIO LOW = pompa ON; al boot rele aperti. Bobine ~210 mA dai 5 V del Pi (ok buck 3 A).</text>
</svg>
