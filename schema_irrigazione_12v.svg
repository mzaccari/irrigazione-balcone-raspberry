<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <style>
      .page { fill: #fbfbf7; }
      .title { font: 700 42px Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 24px Arial, sans-serif; fill: #52616b; }
      .section { font: 700 22px Arial, sans-serif; fill: #334e68; letter-spacing: .5px; }
      .label { font: 700 24px Arial, sans-serif; fill: #1f2933; }
      .small { font: 18px Arial, sans-serif; fill: #334e68; }
      .tiny { font: 15px Arial, sans-serif; fill: #334e68; }
      .box { fill: #ffffff; stroke: #9fb3c8; stroke-width: 3; rx: 8; }
      .busbox { fill: #eef8f4; stroke: #51a37d; stroke-width: 3; rx: 8; }
      .warnbox { fill: #fff7ed; stroke: #f59e0b; stroke-width: 3; rx: 8; }
      .red { stroke: #d7263d; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .black { stroke: #111827; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .green { stroke: #0f9f6e; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12 10; }
      .blue { stroke: #2563eb; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 3; }
      .arrow { marker-end: url(#arrowhead); }
      .dotRed { fill: #d7263d; }
      .dotBlack { fill: #111827; }
      .dotGreen { fill: #0f9f6e; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334e68" />
    </marker>
  </defs>

  <rect class="page" width="1600" height="1100"/>

  <text x="70" y="70" class="title">Schema rapido irrigazione 12 V</text>
  <text x="70" y="108" class="subtitle">3 pompe / 3 aree / 3 serbatoi - Raspberry Pi Zero 2 + MOSFET</text>

  <text x="70" y="165" class="section">ENERGIA</text>
  <text x="70" y="520" class="section">CONTROLLO</text>
  <text x="1010" y="165" class="section">USCITE POMPE</text>

  <!-- Energy blocks -->
  <rect x="70" y="190" width="210" height="115" class="box"/>
  <text x="175" y="235" text-anchor="middle" class="label">Pannello</text>
  <text x="175" y="266" text-anchor="middle" class="small">solare 100 W</text>
  <line x1="102" y1="285" x2="248" y2="285" class="blue thin"/>
  <line x1="126" y1="210" x2="126" y2="300" class="blue thin"/>
  <line x1="166" y1="210" x2="166" y2="300" class="blue thin"/>
  <line x1="206" y1="210" x2="206" y2="300" class="blue thin"/>

  <rect x="340" y="190" width="210" height="115" class="box"/>
  <text x="445" y="235" text-anchor="middle" class="label">MPPT</text>
  <text x="445" y="266" text-anchor="middle" class="small">regolatore carica</text>

  <rect x="610" y="190" width="210" height="115" class="box"/>
  <text x="715" y="235" text-anchor="middle" class="label">Batteria</text>
  <text x="715" y="266" text-anchor="middle" class="small">12 V</text>
  <text x="642" y="290" class="small">+</text>
  <text x="775" y="290" class="small">-</text>

  <rect x="875" y="190" width="150" height="115" class="warnbox"/>
  <text x="950" y="235" text-anchor="middle" class="label">Fusibile</text>
  <text x="950" y="266" text-anchor="middle" class="small">vicino batteria</text>

  <rect x="1080" y="190" width="250" height="145" class="busbox"/>
  <text x="1205" y="228" text-anchor="middle" class="label">Bus potenza</text>
  <line x1="1120" y1="265" x2="1295" y2="265" class="red"/>
  <line x1="1120" y1="305" x2="1295" y2="305" class="black"/>
  <text x="1320" y="272" class="small">+12 V</text>
  <text x="1320" y="312" class="small">GND</text>

  <!-- Energy arrows and wires -->
  <line x1="280" y1="248" x2="340" y2="248" class="blue arrow"/>
  <line x1="550" y1="235" x2="610" y2="235" class="red arrow"/>
  <line x1="550" y1="270" x2="610" y2="270" class="black arrow"/>
  <line x1="820" y1="235" x2="875" y2="235" class="red"/>
  <line x1="1025" y1="235" x2="1120" y2="265" class="red"/>
  <line x1="820" y1="285" x2="1120" y2="305" class="black"/>

  <!-- Control blocks -->
  <rect x="180" y="560" width="250" height="145" class="box"/>
  <text x="305" y="605" text-anchor="middle" class="label">Buck 12-&gt;5 V</text>
  <text x="305" y="637" text-anchor="middle" class="small">alimentatore Pi</text>
  <text x="205" y="680" class="small">IN: 12 V</text>
  <text x="330" y="680" class="small">OUT: 5 V</text>

  <rect x="545" y="545" width="285" height="180" class="box"/>
  <text x="687" y="590" text-anchor="middle" class="label">Raspberry Pi</text>
  <text x="687" y="622" text-anchor="middle" class="small">Zero 2 W</text>
  <text x="575" y="665" class="small">5 V</text>
  <text x="575" y="695" class="small">GND</text>
  <text x="705" y="665" class="small">GPIO 1</text>
  <text x="705" y="695" class="small">GPIO 2</text>
  <text x="705" y="725" class="small">GPIO 3</text>

  <rect x="545" y="780" width="285" height="100" class="box"/>
  <text x="687" y="822" text-anchor="middle" class="label">Morsettiera</text>
  <text x="687" y="852" text-anchor="middle" class="small">GPIO + GND comune</text>

  <!-- Buck to bus and Pi -->
  <line x1="1120" y1="265" x2="210" y2="265" class="red"/>
  <line x1="210" y1="265" x2="210" y2="560" class="red"/>
  <circle cx="210" cy="265" r="7" class="dotRed"/>

  <line x1="1120" y1="305" x2="250" y2="305" class="black"/>
  <line x1="250" y1="305" x2="250" y2="560" class="black"/>
  <circle cx="250" cy="305" r="7" class="dotBlack"/>

  <line x1="430" y1="615" x2="545" y2="615" class="red"/>
  <text x="468" y="602" class="tiny">5 V</text>
  <line x1="430" y1="665" x2="545" y2="695" class="black"/>
  <text x="463" y="690" class="tiny">GND</text>

  <line x1="687" y1="725" x2="687" y2="780" class="black thin"/>
  <line x1="730" y1="665" x2="730" y2="780" class="green"/>
  <line x1="760" y1="695" x2="760" y2="780" class="green"/>
  <line x1="790" y1="725" x2="790" y2="780" class="green"/>

  <!-- Pump module 1 -->
  <rect x="1030" y="410" width="435" height="155" class="box"/>
  <text x="1055" y="447" class="label">Area 1 - Serbatoio 1</text>
  <rect x="1080" y="480" width="95" height="45" class="box"/>
  <text x="1128" y="509" text-anchor="middle" class="small">Pompa 1</text>
  <rect x="1270" y="470" width="105" height="65" class="box"/>
  <text x="1322" y="498" text-anchor="middle" class="small">MOSFET</text>
  <text x="1322" y="522" text-anchor="middle" class="tiny">low side</text>
  <path d="M1080 502 L1010 502 L1010 265 L1120 265" class="red"/>
  <path d="M1175 502 L1270 502" class="black"/>
  <path d="M1322 535 L1322 600 L1120 600 L1120 305" class="black"/>
  <path d="M830 820 L1280 820 L1280 535" class="green"/>
  <text x="1188" y="492" class="tiny">diodo</text>
  <path d="M1160 475 L1160 445 L1285 445 L1285 475" class="black thin"/>
  <polygon points="1206,445 1226,435 1226,455" fill="#111827"/>
  <line x1="1232" y1="435" x2="1232" y2="455" class="black thin"/>
  <text x="1395" y="500" class="tiny">G</text>
  <text x="1300" y="552" class="tiny">S</text>
  <text x="1300" y="465" class="tiny">D</text>

  <!-- Pump module 2 -->
  <rect x="1030" y="610" width="435" height="155" class="box"/>
  <text x="1055" y="647" class="label">Area 2 - Serbatoio 2</text>
  <rect x="1080" y="680" width="95" height="45" class="box"/>
  <text x="1128" y="709" text-anchor="middle" class="small">Pompa 2</text>
  <rect x="1270" y="670" width="105" height="65" class="box"/>
  <text x="1322" y="698" text-anchor="middle" class="small">MOSFET</text>
  <text x="1322" y="722" text-anchor="middle" class="tiny">low side</text>
  <path d="M1080 702 L990 702 L990 265 L1120 265" class="red"/>
  <path d="M1175 702 L1270 702" class="black"/>
  <path d="M1322 735 L1322 800 L1120 800 L1120 305" class="black"/>
  <path d="M830 835 L1300 835 L1300 735" class="green"/>
  <text x="1188" y="692" class="tiny">diodo</text>
  <path d="M1160 675 L1160 645 L1285 645 L1285 675" class="black thin"/>
  <polygon points="1206,645 1226,635 1226,655" fill="#111827"/>
  <line x1="1232" y1="635" x2="1232" y2="655" class="black thin"/>
  <text x="1395" y="700" class="tiny">G</text>
  <text x="1300" y="752" class="tiny">S</text>
  <text x="1300" y="665" class="tiny">D</text>

  <!-- Pump module 3 -->
  <rect x="1030" y="810" width="435" height="155" class="box"/>
  <text x="1055" y="847" class="label">Area 3 - Serbatoio 3</text>
  <rect x="1080" y="880" width="95" height="45" class="box"/>
  <text x="1128" y="909" text-anchor="middle" class="small">Pompa 3</text>
  <rect x="1270" y="870" width="105" height="65" class="box"/>
  <text x="1322" y="898" text-anchor="middle" class="small">MOSFET</text>
  <text x="1322" y="922" text-anchor="middle" class="tiny">low side</text>
  <path d="M1080 902 L970 902 L970 265 L1120 265" class="red"/>
  <path d="M1175 902 L1270 902" class="black"/>
  <path d="M1322 935 L1322 1000 L1120 1000 L1120 305" class="black"/>
  <path d="M830 850 L1320 850 L1320 870" class="green"/>
  <text x="1188" y="892" class="tiny">diodo</text>
  <path d="M1160 875 L1160 845 L1285 845 L1285 875" class="black thin"/>
  <polygon points="1206,845 1226,835 1226,855" fill="#111827"/>
  <line x1="1232" y1="835" x2="1232" y2="855" class="black thin"/>
  <text x="1395" y="900" class="tiny">G</text>
  <text x="1300" y="952" class="tiny">S</text>
  <text x="1300" y="865" class="tiny">D</text>

  <!-- Legend and notes -->
  <rect x="70" y="925" width="870" height="120" class="warnbox"/>
  <text x="95" y="965" class="label">Da ricordare mentre cabli</text>
  <text x="95" y="1000" class="small">1. Tutti i GND insieme: batteria, buck, Raspberry e source dei MOSFET.</text>
  <text x="95" y="1030" class="small">2. Ogni pompa: + al bus +12 V, - al drain MOSFET; source a GND.</text>
  <text x="95" y="1060" class="small">3. Diodo su ogni pompa: catodo al +12 V, anodo al lato MOSFET.</text>

  <rect x="70" y="350" width="360" height="110" class="box"/>
  <text x="95" y="388" class="label">Legenda fili</text>
  <line x1="100" y1="420" x2="160" y2="420" class="red"/>
  <text x="175" y="426" class="small">+12 V potenza</text>
  <line x1="100" y1="450" x2="160" y2="450" class="black"/>
  <text x="175" y="456" class="small">GND comune</text>
  <line x1="100" y1="480" x2="160" y2="480" class="green"/>
  <text x="175" y="486" class="small">segnale GPIO</text>

  <text x="1010" y="1008" class="tiny">Aggiunte consigliate: resistenza 100-220 ohm in serie al gate, pulldown 47k-100k gate-GND, fusibile per ramo pompa.</text>
  <text x="1010" y="1032" class="tiny">Schema funzionale per montaggio: verifica correnti, polarita e dimensionamento cavi prima di alimentare.</text>
</svg>
